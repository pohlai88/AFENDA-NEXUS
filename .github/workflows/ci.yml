# ────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Afenda Monorepo
# ────────────────────────────────────────────────────────────────────────────
# Architecture:
#
#   changes ─┬─→ quality ──┬──→ e2e
#            ├─→ test ─────┤
#            ├─→ guards ───┼──→ docker (master only)
#            │             │
#            └─ (skip if docs-only PR)
#
# Optimisations vs. previous version:
#   1. Composite setup action — DRY checkout/pnpm/node/install/Turbo cache
#   2. Turbo local-cache shared across runs via actions/cache
#   3. Path-based filtering — docs-only PRs skip all heavy jobs
#   4. Parallel gate runner — 30 gates run concurrently (~5-10× faster)
#   5. Test result publishing — JUnit XML → GitHub check annotations
#   6. Coverage artifact upload for downstream analysis
#   7. Job summaries via GITHUB_STEP_SUMMARY
# ────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # dorny/test-reporter
  pull-requests: read # dorny/paths-filter

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.4'
  TURBO_TELEMETRY_DISABLED: 1
  # Uncomment when Vercel Remote Cache is configured:
  # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  # TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ─── Change Detection ──────────────────────────────────────────────────
  # Determines which file groups changed so downstream jobs can be skipped
  # for docs-only PRs while always running on pushes to master.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'apps/**'
              - 'packages/**'
              - 'tools/**'
              - '.agents/**'
              - '.github/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
              - 'vitest.shared.ts'
              - 'vitest.workspace.ts'

  # ─── Quality Gates ────────────────────────────────────────────────────
  quality:
    name: Build · Type · Lint · Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo build --affected

      - name: Typecheck
        run: pnpm turbo typecheck --affected

      - name: Lint
        run: pnpm turbo lint --affected

      - name: Format check
        run: pnpm format:check

  # ─── Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # Build first — tests may depend on built packages
      - name: Build
        run: pnpm turbo build --affected

      - name: Unit & Integration tests (with coverage)
        run: pnpm turbo test:coverage --affected
        env:
          CI: true

      - name: Property-based tests
        run: pnpm turbo test:property --affected
        env:
          CI: true

      # ── Artifacts ────────────────────────────────────────────────────
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_attempt }}
          path: |
            packages/*/coverage/
            apps/*/coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit & Integration Tests
          path: '**/junit-results.xml'
          reporter: java-junit
          fail-on-error: false

  # ─── Governance & Drift Guards (Parallel) ─────────────────────────────
  # All 22 gates run concurrently via the parallel gate runner for a
  # ~5-10× speedup over sequential execution. Output includes a
  # GitHub Actions Job Summary with pass/fail table.
  guards:
    name: Governance · Gates (Parallel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes]
    if: github.event_name == 'push' || needs.changes.outputs.src == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run all gates in parallel (35 gates)
        run: node tools/scripts/run-gates-parallel.mjs
        env:
          CI: true

  # ─── Docker Build ──────────────────────────────────────────────────────
  docker:
    name: Docker · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, test, guards]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: afenda-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── E2E Tests ─────────────────────────────────────────────────────────
  e2e:
    name: E2E · Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # Playwright browser cache
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # Build API and Web (Turbo-cached — near-instant on cache hit)
      - name: Build API & Web
        run: pnpm turbo build --filter=@afenda/api --filter=@afenda/web

      # Install only Chromium for CI (fastest + most compatible)
      - name: Install Playwright browsers
        run: pnpm --filter @afenda/e2e exec playwright install chromium --with-deps

      # Run E2E suite (excludes @nightly tag in default run)
      - name: Run E2E tests
        run: pnpm --filter @afenda/e2e exec playwright test --grep-invert "@nightly" --reporter=blob
        env:
          CI: true
          NODE_ENV: test
          PORT_API: '3001'
          # Leave NEON_AUTH_BASE_URL unset → activates API dev-fallback auth
          DATABASE_URL: ${{ secrets.DATABASE_URL_E2E }}
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_UNPOOLED_E2E }}
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ github.run_attempt }}
          path: apps/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_attempt }}
          path: apps/e2e/test-results/
          retention-days: 7
